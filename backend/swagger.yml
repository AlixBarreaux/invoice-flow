paths:
  /invoices:
    get:
      summary: Get all invoices paginated
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: itemsPerPage
          in: query
          schema:
            type: integer
            default: 20
        - name: client
          in: query
          schema:
            type: string
        - name: minAmount
          in: query
          schema:
            type: number
        - name: maxAmount
          in: query
          schema:
            type: number
      responses:
        200:
          description: Paginated invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                  itemsPerPage:
                    type: integer
                  total:
                    type: integer
                  invoices:
                    type: array
                    items:
                      $ref: "#/components/schemas/Invoice"
        400:
          description: Invalid query parameters

    post:
      summary: Create a single invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        201:
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        400:
          description: Validation error

  /invoices/bulk:
    post:
      summary: Create several invoices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/InvoiceInput"
      responses:
        201:
          description: Bulk created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

    delete:
      summary: Bulk delete invoices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: integer
      responses:
        200:
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  deletedCount:
                    type: integer

  /invoices/{id}:
    get:
      summary: Get invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Invoice found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        400:
          description: Invalid ID
        404:
          description: Invoice not found

    put:
      summary: Update invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        200:
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        400:
          description: Invalid ID or payload
        404:
          description: Invoice not found

    delete:
      summary: Delete invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Invoice deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        400:
          description: Invalid ID
        404:
          description: Invoice not found